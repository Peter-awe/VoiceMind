name: Build macOS DMG

on:
  push:
    tags:
      - "desktop-v*"  # Trigger on desktop version tags: desktop-v1.0.0, etc.
  workflow_dispatch:   # Also allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build DMG (Intel)
        run: npx electron-builder --mac dmg --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false  # Skip code signing for now

      - name: Build DMG (Apple Silicon)
        run: npx electron-builder --mac dmg --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List built files
        run: ls -la dist/

      - name: Upload DMGs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KiwiPenNotes-macOS-DMGs
          path: desktop/dist/*.dmg
          retention-days: 30

      # Create GitHub Release when triggered by a tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
